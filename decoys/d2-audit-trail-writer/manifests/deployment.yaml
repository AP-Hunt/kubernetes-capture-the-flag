apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-trail-writer
  namespace: apps
  labels:
    app: audit-trail-writer
  annotations:
    platform.internal/owner: "mallory@example.com"
    platform.internal/note: "audit log shipper — pending decommission"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-trail-writer
  template:
    metadata:
      labels:
        app: audit-trail-writer
    spec:
      containers:
        - name: writer
          image: curlimages/curl:8.13.0
          command: ["sleep", "infinity"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 100
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
