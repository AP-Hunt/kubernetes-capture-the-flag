apiVersion: apps/v1
kind: Deployment
metadata:
  name: csv-validator
  namespace: datagovuk
  labels:
    app: csv-validator
  annotations:
    platform.internal/owner: "mallory@example.com"
    platform.internal/note: "CSV schema validator for data.gov.uk ingestion"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: csv-validator
  template:
    metadata:
      labels:
        app: csv-validator
    spec:
      containers:
        - name: validator
          image: 430354129336.dkr.ecr.eu-west-1.amazonaws.com/ctf/csv-validator:latest
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: csv-validator
  namespace: datagovuk
spec:
  selector:
    app: csv-validator
  ports:
    - port: 8080
      targetPort: 8080
