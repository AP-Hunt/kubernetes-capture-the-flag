apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-shipper
  namespace: apps
  labels:
    app: log-shipper
  annotations:
    platform.internal/owner: "mallory@example.com"
    platform.internal/note: "log forwarding agent — pending decommission"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-shipper
  template:
    metadata:
      labels:
        app: log-shipper
    spec:
      containers:
        - name: shipper
          image: curlimages/curl:8.13.0
          command: ["sleep", "infinity"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 100
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
