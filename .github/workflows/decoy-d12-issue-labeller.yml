name: Issue Labeller

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Label issue
        run: |
          echo "Labelling issue: $ISSUE_TITLE"
          echo "Label applied"
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
