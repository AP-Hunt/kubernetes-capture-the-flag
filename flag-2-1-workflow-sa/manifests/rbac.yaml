apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-platform-admin
  namespace: cluster-services
  annotations:
    platform.internal/purpose: "cross-namespace resource lifecycle management"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-platform-admin-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: argo-platform-admin
    namespace: cluster-services
