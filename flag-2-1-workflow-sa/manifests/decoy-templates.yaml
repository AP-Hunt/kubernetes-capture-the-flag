apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: namespace-quota-reporter
  namespace: cluster-services
  annotations:
    platform.internal/owner: "mallory@example.com"
    platform.internal/note: "reports resource quota usage across namespaces"
spec:
  serviceAccountName: default
  entrypoint: report-quotas
  templates:
    - name: report-quotas
      container:
        image: alpine/k8s:1.32.13
        command: [sh, -c]
        args:
          - |
            echo "=== Namespace Quota Report ==="
            kubectl get resourcequotas --all-namespaces 2>/dev/null || echo "No quotas configured"
            echo "=== Report complete ==="
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: pod-restart-monitor
  namespace: cluster-services
  annotations:
    platform.internal/owner: "mallory@example.com"
    platform.internal/note: "monitors crashlooping pods and reports status"
spec:
  serviceAccountName: argo-workflows-server
  entrypoint: check-restarts
  templates:
    - name: check-restarts
      container:
        image: alpine/k8s:1.32.13
        command: [sh, -c]
        args:
          - |
            echo "=== Pod Restart Monitor ==="
            kubectl get pods --all-namespaces --field-selector=status.phase!=Running 2>/dev/null || echo "All pods healthy"
            echo "=== Check complete ==="
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: image-tag-auditor
  namespace: cluster-services
  annotations:
    platform.internal/owner: "mallory@example.com"
    platform.internal/note: "audits deployment image tags for mutable references"
spec:
  serviceAccountName: argo-workflows-server
  entrypoint: audit-tags
  templates:
    - name: audit-tags
      container:
        image: alpine/k8s:1.32.13
        command: [sh, -c]
        args:
          - |
            echo "=== Image Tag Audit ==="
            kubectl get deployments --all-namespaces -o jsonpath='{range .items[*]}{.metadata.namespace}/{.metadata.name}: {.spec.template.spec.containers[*].image}{"\n"}{end}' 2>/dev/null || echo "Unable to list deployments"
            echo "=== Audit complete ==="
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
