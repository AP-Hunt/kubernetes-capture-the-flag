apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-metrics-collector
  namespace: kube-system
  labels:
    app: node-metrics-collector
    component: monitoring
  annotations:
    platform.internal/owner: "mallory@example.com"
    platform.internal/note: "lightweight node-level metrics agent — approved in SEC-2847"
    build.internal/artifact-hash: "VGhlIGJ1Y2tldHMgdHJ1c3RlZCB3aG9ldmVyIGFza2VkIG5pY2VseS4="
spec:
  selector:
    matchLabels:
      app: node-metrics-collector
  template:
    metadata:
      labels:
        app: node-metrics-collector
        component: monitoring
    spec:
      initContainers:
        - name: config-bootstrap
          image: busybox:1.37
          # privileged required for direct /etc access — performance optimisation for config reads
          command: ["sh", "-c", "cp /host-etc/hostname /tmp/hostname && echo bootstrap complete"]
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
            - name: host-etc
              mountPath: /host-etc
            - name: tmp
              mountPath: /tmp
      containers:
        - name: collector
          image: 430354129336.dkr.ecr.eu-west-1.amazonaws.com/ctf/node-metrics-collector:latest
          ports:
            - containerPort: 9100
              name: metrics
      volumes:
        - name: host-etc
          hostPath:
            path: /etc
            type: Directory
        - name: tmp
          emptyDir: {}
