apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-cgroup-exporter
  namespace: kube-system
  labels:
    app: node-cgroup-exporter
    component: monitoring
  annotations:
    platform.internal/owner: "mallory@example.com"
    platform.internal/note: "cgroup metrics exporter for capacity planning"
spec:
  selector:
    matchLabels:
      app: node-cgroup-exporter
  template:
    metadata:
      labels:
        app: node-cgroup-exporter
        component: monitoring
    spec:
      containers:
        - name: exporter
          image: alpine/k8s:1.32.13
          command: ["sleep", "infinity"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: host-cgroup
              mountPath: /host-cgroup
              readOnly: true
      volumes:
        - name: host-cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
