apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-admin-api
  namespace: cluster-services
  labels:
    app: platform-admin-api
  annotations:
    platform.internal/owner: "mallory@example.com"
    platform.internal/note: "internal admin API — no external exposure"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-admin-api
  template:
    metadata:
      labels:
        app: platform-admin-api
    spec:
      containers:
        - name: admin
          image: 430354129336.dkr.ecr.eu-west-1.amazonaws.com/ctf/hooky:latest
          args: ["--mode=admin"]
          ports:
            - containerPort: 8080
          env:
            - name: ADMIN_RESPONSE
              value: "TWFsbG9yeSB3cm90ZSB0aGlzLiBNYWxsb3J5IHdyb3RlIGV2ZXJ5dGhpbmcu"
---
apiVersion: v1
kind: Service
metadata:
  name: platform-admin-api
  namespace: cluster-services
spec:
  selector:
    app: platform-admin-api
  ports:
    - port: 8080
      targetPort: 8080
