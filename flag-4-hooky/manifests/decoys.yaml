apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-callbacks-receiver
  namespace: apps
  labels:
    app: payment-callbacks-receiver
  annotations:
    platform.internal/owner: "mallory@example.com"
    platform.internal/note: "payment callback handler — pending decommission"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-callbacks-receiver
  template:
    metadata:
      labels:
        app: payment-callbacks-receiver
    spec:
      containers:
        - name: receiver
          image: curlimages/curl:8.13.0
          command: ["sleep", "infinity"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 100
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
